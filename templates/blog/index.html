{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <h1 class="fw-bold text-primary mb-1"><i class="bi bi-journal-text me-2"></i>WordMaster Blog</h1>
  <p class="text-muted mb-4">Tips, strategies, and word game guides.</p>

  <div class="row g-4">
    {% for post in posts %}
    <div class="col-md-4">
      <div class="card h-100 shadow-sm blog-card border-0">
        <div class="card-body">
          <span class="badge bg-primary mb-2">Word Tips</span>
          <h5 class="fw-bold">{{ post.title }}</h5>
          <p class="text-muted small">{{ post.excerpt }}</p>
        </div>
        <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center">
          <small class="text-muted"><i class="bi bi-calendar3 me-1"></i>{{ post.date }}</small>
          <a href="/blog/{{ post.slug }}" class="btn btn-sm btn-outline-primary">Read →</a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
